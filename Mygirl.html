<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Fotoku</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffd6e8, #ffe9f0);
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    text-align: center;
    max-width: 340px;
  }

  .card img {
    width: 100%;
    border-radius: 14px;
    object-fit: cover;
    aspect-ratio: 4 / 5;
  }

  .card h2 {
    margin: 16px 0 4px;
    color: #d6336c;
  }

  .card p {
    margin: 0;
    color: #888;
    font-size: 14px;
  }
</style>
</head>
<body>

  <div class="card">
    <img src="CWEKU.jpeg" alt="Foto Pacarku">
    <h2>Cello Aurellia</h2>
    <p>Haii cewe aku yang manis, lucu dan cantik ✨</p>
  </div>

</body>
</html>
